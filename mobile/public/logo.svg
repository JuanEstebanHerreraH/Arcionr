<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Arcionr">
  <defs>
    <clipPath id="rounded">
      <rect x="56" y="56" width="400" height="400" rx="104" ry="104"/>
    </clipPath>
    <linearGradient id="gloss" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.22"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Cuerpo: tres bandas neapolitanas -->
  <g clip-path="url(#rounded)">
    <rect x="56" y="56" width="400" height="400" fill="#F4E4D7"/>          <!-- vainilla -->
    <rect x="56" y="56" width="400" height="150" fill="#E9A6B3"/>          <!-- fresa -->
    <rect x="56" y="306" width="400" height="150" fill="#6E4B3A"/>         <!-- chocolate -->
    <rect x="56" y="56" width="400" height="400" fill="url(#gloss)"/>
  </g>

  <!-- Glifo de conversión: dos flechas que intercambian (swap) -->
  <g stroke="#3A2A22" stroke-width="26" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <path d="M196 210 H320 l-40 -40"/>
    <path d="M316 302 H192 l40 40"/>
  </g>

  <!-- Borde sutil -->
  <rect x="56" y="56" width="400" height="400" rx="104" ry="104" fill="none" stroke="#3A2A22" stroke-opacity="0.12" stroke-width="6"/>
</svg>
